<p-fluid>
  <div class="grid p-fluid" style="text-align: right">
    <div class="col-12 md:col-6">       
      <div class="field">Errores {{this._servicio.ContadorErrores}}.</div>
    </div>
  </div>
</p-fluid>
<p-fluid>
  <div class="grid p-fluid">
    <div class="col-12 md:col-6">
      <div class="field">
        <input
          id="snorlax"
          [disabled]="this._servicio.EsCarreraTerminada"
          type="text"
          #inputFocus
          autocomplete="off"
          pInputText
          [(ngModel)]="value"
          [class]="getInputClasses()"
          (keydown)="onKeyDown($event)"
          (keyup)="onKeyUp($event)"
          (keypress)="onKeyPress($event)"
          (keydown.enter)="onEnterKey()"
          (keydown.escape)="onEscapeKey()"
          autofocus
        />
      </div>
    </div>
  </div>
</p-fluid>
