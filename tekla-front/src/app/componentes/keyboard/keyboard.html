<p-fluid>
  <div class="grid p-fluid">
    <div class="col-12 md:col-6">
      <div class="field">
        <input
          id="snorlax"
          [disabled]="cs.carreraTerminada()"
          type="text"
          #inputFocus
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          pInputText
          [class]="getInputClasses()"
          (keydown)="onKeyDown($event)"
          (input)="onInput($event)"
          autofocus
        />
      </div>
      @if (cs.carreraTerminada()) {
        <p class="text-green-500 font-bold">¡Carrera terminada!</p>
      }
    </div>
  </div>
</p-fluid>
